<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
    <div class="container">
        <h2 class="text-center">Bootstrap Modal Form</h2>
        <div class="row justify-content-center">
            <div class="col-md-3  mt-5">
                <!-- Button to open modal -->
                <button class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#myModal">
                    Open Form
                </button>

                <!-- data-backdrop="static" ess sy bahir click krnny sy form close nhi hoga -->
                <div class="modal fade" id="myModal" data-backdrop="static">
                    <!-- modal-dialog-centerd  vertically center -->
                    <div class="modal-dialog modal-dialog-centerd">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h4 class="modal-title">User Form</h4>
                                <button class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col">
                                        <form>
                                            <div class="mb-3">
                                                <label class="form-label">Name</label>
                                                <input type="text" class="form-control" placeholder="Enter Name">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" placeholder="Enter Email">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control"
                                                    placeholder="Enter Password">
                                            </div>
                                            <div class="row">
                                                <div class="col-md-4 mb-2">
                                                    <label for="" class="form-lable">City</label>
                                                    <input class="form-control" type="text" name="" id="" placeholder="Enter city">
                                                </div>
                                                <div class="col-md-4">
                                                    <label for="" class="form-lable">postal code</label>
                                                    <input class="form-control" type="text" name="" id="" placeholder="Enter postal code">
                                                </div>
                                                <div class="col-md-4">
                                                    <label for="" class="form-lable">postal code</label>
                                                    <input class="form-control" type="text" name="" id="" placeholder="Enter postal code">
                                                </div>
                                            </div>
                                            <button type="submit" class="btn btn-warning w-100">Submit</button>
                                        </form>
                                        
                                    </div>
                                </div>

                            </div>
                            <div class="modal-footer">
                                <h5 class="text-start me-auto">Close or Save</h5>
                                <div class="d-flex justify-content-center align-item-center">
                                    <button class="btn btn-danger text-center me-2"
                                        data-bs-dismiss="modal">Close</button>
                                    <button class="btn btn-primary">save</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
