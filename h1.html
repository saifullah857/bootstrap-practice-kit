<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fixed Heading</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --primary: #fb873f;
}

body {
    background: #f2f2f2;
}

/* Section Title */
.section-title {
    position: relative;
    display: inline-block;
    text-transform: uppercase;
    font-weight: 600;
    background: #fff;
    padding: 0 15px;
}

/* LEFT LINE */
.section-title::before {
    content: "";
    position: absolute;
    width: 60px;
    height: 2px;
    background: var(--primary);
    top: 50%;
    left: -80px;
}

/* RIGHT LINE */
.section-title::after {
    content: "";
    position: absolute;
    width: 60px;
    height: 2px;
    background: var(--primary);
    top: 50%;
    right: -80px;
}
</style>
</head>

<body>

<div class="container text-center py-5">

    <h6 class="section-title">POPULAR COURSES</h6>

    <h1 class="mt-3" style="color:#fb873f;">
        Explore new and trending free online courses
    </h1>

</div>

</body>
</html>
