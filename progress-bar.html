<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Bootstrap Progress Bar</h2>
        <div class="row py-3">
            <div class="col-md-4">
                <h4>web development</h4>
                <div class="progress">
                    <div class="progress-bar" style="width: 50%;" >50%</div>
                </div>
            </div>
            <div class="col-md-4">
                <h4>app development</h4>
                <div class="progress">
                    <div class="progress-bar bg-warning"  style="width: 20%;" > HTML 20%</div>
                    <div class="progress-bar bg-danger"  style="width: 25%;" > CSS 25%</div>
                    <div class="progress-bar bg-success"  style="width: 20%;" > JavaScript 20%</div>
                </div>
            </div>
            <div class="col-md-4">
                <h4>data analysis</h4>
                <div class="progress">
                    <div class="progress-bar bg-info"  style="width: 60%;" >60%</div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <h4>AI/ML</h4>
                <div class="progress">
                    <div class="progress-bar progress-bar-striped" style="width: 50%;" >50%</div>
                </div>
            </div>
            <div class="col-md-4">
                <h4>cyber security</h4>
                <div class="progress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning"  style="width: 60%;" > 60%</div>
                    
                </div>
        </div>
    </div>
</body>
</html>
