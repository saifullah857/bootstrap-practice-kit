
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Fix</title>

    <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>

<div class="container">
    <h1 class="text-center text-danger">Bootstrap Alerts</h1>

    <div class="row">
        <div class="col-md-6 m-auto mt-5 text-center">

            <!-- Button -->
            <button class="btn btn-outline-danger my-3" id="show">
                Show Alert
            </button>

            <!-- Alert -->
            <div id="myalert" class="alert alert-warning alert-dismissible fade d-none" role="alert">
                A simple warning alert—check it out!
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let showBtn = document.getElementById("show");
    let alertbox = document.getElementById("myalert");

    showBtn.addEventListener("click", () => {

        // Reset alert (important)
        alertbox.classList.remove("d-none", "show");

        // Small delay to restart animation
        setTimeout(() => {
            alertbox.classList.add("fade");
            alertbox.classList.add("show");
        }, 10);

    });
</script>

</body>
</html>
