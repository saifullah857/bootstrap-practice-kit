
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Design</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .nav-link {
            color: gray;
        }

        .nav-link:hover {
            color: white;
        }

        /* First bottom section */
        .footer-top-bottom {
            border-top: 1px solid #444;
            padding: 20px 0;
        }

        /* Second bottom section (separate bar) */
        .footer-bottom {
            
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icons i {
            font-size: 20px;
            margin-left: 15px;
            cursor: pointer;
        }

        .social-icons i:hover {
            color: #0d6efd;
        }
    </style>
</head>

<body>

<div class="container-fluid  text-white py-5" style="background-color: rgb(0, 0, 66);">
    <div class="container">

        <!-- Links Section -->
        <div class="row">
            <div class="col-md-3">

                </ul>
            </div>

            <div class="col-md-3">

                    <li><a href="#" class="nav-link">Contact Us</a></li>
                    <li><a href="#" class="nav-link">Blogs</a></li>
                </ul>
            </div>

            <div class="col-md-3">
                <ul class="nav flex-column gap-1">
                    <li><a href="#" class="nav-link">Home</a></li>
                    <li><a href="#" class="nav-link">About Us</a></li>
                    <li><a href="#" class="nav-link">Contact Us</a></li>
                    <li><a href="#" class="nav-link">Blogs</a></li>
                </ul>
            </div>

            <div class="col-md-3">
                <ul class="nav flex-column gap-1">
                    <li><a href="#" class="nav-link">Home</a></li>
                    <li><a href="#" class="nav-link">About Us</a></li>
                    <li><a href="#" class="nav-link">Contact Us</a></li>
                    <li><a href="#" class="nav-link">Blogs</a></li>
                </ul>
            </div>
        </div>

        <!-- First Bottom Section -->
        <div class="row footer-top-bottom mt-4 align-items-center text-center">
            <div class="col-md-6">
                <p class="mb-0">
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                </p>

            <div class="col-md-6 text-center social-icons">

                <i class="bi bi-youtube"></i>
                <i class="bi bi-tiktok"></i>

    </div>

    <div class="footer-bottom">
        <p class="mb-0 text-white">

</div>

</html>
