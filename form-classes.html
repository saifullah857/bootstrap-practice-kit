<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Form</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.css">

    <style>
        body {
            min-height: 100vh;
            background-color: #fffdf1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

</head>

<body>

    <div class="container border border-2 border-dark p-5 bg-white">

        <h2 class="text-center mb-4">Bootstrap Form</h2>

        <div class="row">

            <!-- ================= LEFT SIDE ================= -->
            <div class="col-md-6">

                <label class="form-label">Name</label>
                <input type="text" class="form-control mb-3" placeholder="Enter Your Name">

                <label class="form-label">Email</label>
                <input type="email" class="form-control mb-2" placeholder="Enter Your Email">
                <small class="text-muted">We'll never share your email.</small>

                <label class="form-label mt-3">Password</label>
                <input type="password" class="form-control mb-2" placeholder="Enter Password">

                <label class="form-label mt-3">Country</label>
                <select class="form-control mb-3">
                    <option>Select Country</option>
                    <option>Pakistan</option>
                    <option>India</option>
                    <option>Bangladesh</option>
                </select>

                <label class="form-label">Message</label>
                <textarea class="form-control" rows="3" placeholder="Enter Message"></textarea>

            </div>

            <!-- ================= RIGHT SIDE ================= -->
            <div class="col-md-6">

                <label class="form-label">File Upload</label>
                <input type="file" class="form-control mb-3">

                <label class="form-label">Range</label>
                <input type="range" class="form-range mb-4" min="0" max="5">

                <!-- ADDRESS ROW FIXED -->
                <div class="row">

                    <div class="col-md-6">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control mb-3" placeholder="Enter City">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Postal Code</label>
                        <input type="text" class="form-control mb-3" placeholder="Enter Postal Code">
                    </div>

                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label for="" class="form-label">Semester</label>
                        <input type="number" class="form-control mb-3" placeholder="Enter Semester">
                    </div>
                    <div class="col-md-6">
                        <label for="" class="form-label"></label>CGPA</label>
                        <input type="number" class="form-control mb-3" placeholder="Enter CGPA">
                    </div>
                </div>

                <div class="row">

                    <!-- ================= HOBBIES (CHECKBOX) ================= -->
                    <div class="col-md-6">
                        <label class="form-label">Hobbies</label>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="hobby1">
                            <label class="form-check-label" for="hobby1">Reading</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="hobby2">
                            <label class="form-check-label" for="hobby2">Gaming</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="hobby3">
                            <label class="form-check-label" for="hobby3">Sports</label>
                        </div>
                    </div>

                    <!-- ================= CGPA (RADIO BUTTONS) ================= -->
                    <div class="col-md-6">
                        <label class="form-label">CGPA Range</label>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="cgpa" id="cgpa1">
                            <label class="form-check-label" for="cgpa1">2.0 - 2.5</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="cgpa" id="cgpa2">
                            <label class="form-check-label" for="cgpa2">2.6 - 3.0</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="cgpa" id="cgpa3">
                            <label class="form-check-label" for="cgpa3">3.1 - 4.0</label>
                        </div>
                    </div>

                </div>

                <div class="mb-3">
                    <label for="formFile" class="form-label">Choose File</label> <br>
                    <input class="form-control" type="file" id="formFile">
                </div>

            </div>

        </div>

    </div>

</body>

</html>
