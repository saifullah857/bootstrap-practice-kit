<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
    <div class="container">
        <h2 class="text-center">Bootstrap Image and video classes</h2>
        <div class="row">
            <div class="col-md-4  ">
                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png" alt="logo" class="img-fluid">
            </div>
            <div class="col-md-4  ">
                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png" alt="logo" class="img-thumbnail">
            </div>
            <div class="col-md-4  ">
                <img src="https://images.unsplash.com/photo-1773655688962-f116b722f1eb?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="logo" class="rounded-pill img-fluid ">
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-4  ">
                <figure class="figure">
                    <img src="https://images.unsplash.com/photo-1777026050794-a5e4ef7cd254?q=80&w=871&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="logo"
                        class="figure-img img-fluid rounded">
                    <figcaption class="figure-caption text-center">Caption for the image</figcaption>
                </figure>
            </div>
        </div>
    </div>
</body>

</html>
